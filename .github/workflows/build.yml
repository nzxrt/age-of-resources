name: Build Age of Resources EXE and Release

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:  # можно запускать вручную
  release:
    types: [created]   # срабатывает при создании релиза

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --name "AgeOfResources" --add-data "assets;assets" run.py

    - name: Upload EXE as artifact (for testing)
      uses: actions/upload-artifact@v4
      with:
        name: AgeOfResources
        path: dist/AgeOfResources.exe

    - name: Upload EXE to Release (if release was created)
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: dist/AgeOfResources.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
